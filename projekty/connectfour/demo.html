<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi Connect Four</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <header class="app-topbar">
        <a class="brand" href="../../projekty.html" aria-label="Back to work">
            <svg class="arrow-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                <path d="M17 17 7 7" />
                <path d="M17 7H7v10" />
            </svg>
            Work
        </a>
        <a class="lang-link" href="../../pl/projekty/connectfour/demo.html" aria-label="Polish version">PL</a>
    </header>

    <main class="app-shell">
        <section class="hero">
            <div>
                <span class="kicker">AI Game / Alpha-beta pruning</span>
                <h1>Multi Connect Four</h1>
                <p class="lead">Play four boards at once. Survive every board to win; lose one board and the match is over.</p>
            </div>
            <aside class="rule-panel">
                <span class="kicker">Control</span>
                <p>Use buttons or keys <strong>1-7</strong> on the active board.</p>
            </aside>
        </section>

        <section class="game-container" aria-label="Multi Connect Four game">
            <div class="game-toolbar">
                <button type="button" onclick="newGames()">New Games</button>
                <div class="game-info">
                    <div id="status"></div>
                    <div class="keyboard-hint">Press keys 1-7 to drop tokens on the active board.</div>
                </div>
            </div>

            <div class="multi-board-container">
                <div class="board-wrapper">
                    <div class="board-header">Board 1</div>
                    <div class="board active-board" id="board-0">
                        <div class="column-buttons" id="columnButtons-0"></div>
                        <div class="grid" id="grid-0"></div>
                    </div>
                    <div class="board-result" id="result-0"></div>
                </div>

                <div class="board-wrapper">
                    <div class="board-header">Board 2</div>
                    <div class="board inactive-board" id="board-1">
                        <div class="column-buttons" id="columnButtons-1"></div>
                        <div class="grid" id="grid-1"></div>
                    </div>
                    <div class="board-result" id="result-1"></div>
                </div>

                <div class="board-wrapper">
                    <div class="board-header">Board 3</div>
                    <div class="board inactive-board" id="board-2">
                        <div class="column-buttons" id="columnButtons-2"></div>
                        <div class="grid" id="grid-2"></div>
                    </div>
                    <div class="board-result" id="result-2"></div>
                </div>

                <div class="board-wrapper">
                    <div class="board-header">Board 4</div>
                    <div class="board inactive-board" id="board-3">
                        <div class="column-buttons" id="columnButtons-3"></div>
                        <div class="grid" id="grid-3"></div>
                    </div>
                    <div class="board-result" id="result-3"></div>
                </div>
            </div>
        </section>
    </main>

    <script src="connect4.js"></script>
    <script src="alphabeta-agent.js"></script>
    <script src="multi-game-ui.js"></script>
</body>

</html>
