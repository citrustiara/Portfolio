<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>The Eerie Walk</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="stage">
    <!-- 480x270 internal buffer, upscaled with image-rendering: pixelated -->
    <canvas id="screen"></canvas>

    <!-- Faint center dot — doubles as the flashlight aim point -->
    <div id="reticle"></div>
    <div id="gun-hint">press 1 to pull out the gun</div>

    <!-- Start / pause overlay -->
    <div id="overlay">
      <div id="overlay-inner">
        <h1 id="overlay-title">the eerie walk</h1>
        <p id="overlay-hint">click to enter. wasd move · mouse look · f flashlight · 1 equip · esc release</p>
        <p id="overlay-note">use headphones. the flashlight is the only thing keeping the dark out.</p>
      </div>
    </div>
  </div>

  <script type="module" src="src/main.js"></script>
</body>
</html>
